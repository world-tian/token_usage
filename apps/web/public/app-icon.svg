<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b3c6"/>
      <stop offset="0.55" stop-color="#0a6e86"/>
      <stop offset="1" stop-color="#06283b"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff2c4"/>
      <stop offset="1" stop-color="#f5a524"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#bdf3ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#bdf3ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <circle cx="512" cy="430" r="360" fill="url(#glow)"/>

  <!-- token 币（潮汐上升的太阳/代币） -->
  <circle cx="512" cy="424" r="150" fill="url(#coin)"/>
  <circle cx="512" cy="424" r="150" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="10"/>
  <text x="512" y="476" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="170" font-weight="800"
        text-anchor="middle" fill="#0a6e86">T</text>

  <!-- 潮汐：两层海浪 -->
  <path d="M0 620 C 170 560, 340 700, 512 640 C 684 580, 854 700, 1024 632 L 1024 1024 L 0 1024 Z"
        fill="#ffffff" fill-opacity="0.16"/>
  <path d="M0 712 C 180 648, 350 792, 512 728 C 674 664, 844 792, 1024 716 L 1024 1024 L 0 1024 Z"
        fill="#eafcff" fill-opacity="0.92"/>
  <path d="M0 712 C 180 648, 350 792, 512 728 C 674 664, 844 792, 1024 716"
        fill="none" stroke="#ffffff" stroke-width="8" stroke-opacity="0.7"/>
</svg>
