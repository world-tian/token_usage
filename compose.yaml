services:
  token-tide:
    build: .
    container_name: token-tide
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - HOST=0.0.0.0
      - PORT=8787
      - PUBLIC_BASE_URL=https://token.cpolar.cn
      - DB_FILE=/app/data/token-tide.db
      - NODE_ENV=production
      - USD_CNY_RATE=7.2
      - ORG_TIMEZONE=Asia/Shanghai
      # 飞书开放平台配置 (如需启用飞书动态签名和登录，请填写并修改回调地址中的域名)
      # 密钥不入库：真实值放在与本文件同目录、被 .gitignore 忽略的 .env 里（compose 自动读取并插值）
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_REDIRECT_URI=${FEISHU_REDIRECT_URI:-https://token.cpolar.cn/api/v1/auth/feishu/callback}
      - FEISHU_OAUTH_SCOPE=${FEISHU_OAUTH_SCOPE:-}
      - OAUTH_STATE_SECRET=${OAUTH_STATE_SECRET:-}
    volumes:
      # 数据持久化目录挂载，本地开发测试时保存在当前目录下的 data 文件夹中
      # 群晖部署时可以改为：/volume1/docker/token-tide:/app/data
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
